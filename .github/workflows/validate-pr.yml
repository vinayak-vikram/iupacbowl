name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate functional groups changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: node .github/scripts/validate-fg.js
